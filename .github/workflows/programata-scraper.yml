name: Programata Scraper

on:
  schedule:
    # GitHub Actions cron uses UTC.
    - cron: '0 6,18 * * *'
  workflow_dispatch:

concurrency:
  group: programata-scraper
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  scrape:
    name: Scrape Programata.bg
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: scraper

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: scraper/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY || secrets.Kuche }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SCRAPER_AUTH_EMAIL: ${{ secrets.SCRAPER_AUTH_EMAIL }}
          SCRAPER_AUTH_PASSWORD: ${{ secrets.SCRAPER_AUTH_PASSWORD }}
          SCRAPER_SOURCE_URL: ${{ secrets.SCRAPER_SOURCE_URL }}
          SCRAPER_DEFAULT_USER_ID: ${{ secrets.SCRAPER_DEFAULT_USER_ID }}
        run: python scrape_events_programata.py